server {
    listen 80;
    server_name pic.xhs365.cn;

    # 强制跳转 HTTPS（Cloudflare代理时可选）
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket 支持（如需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置（图片生成可能耗时较长）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 文件上传大小限制
        client_max_body_size 20M;
    }

    # 静态资源直接由 Nginx 处理，减轻应用负担
    location /static/ {
        alias /opt/aipic/backend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 生成的图片资源
    location /static/outputs/ {
        alias /opt/aipic/backend/outputs/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问敏感目录
    location ~ /\.(env|git) {
        deny all;
    }

    location ~ /(user_data|temp|scripts|tests|deploy)/ {
        deny all;
    }

    # 日志
    access_log /var/log/nginx/aipic_access.log;
    error_log /var/log/nginx/aipic_error.log;
}

