server {
    listen 80;
    server_name pic.xhs365.cn;

    real_ip_header CF-Connecting-IP;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;

    location / {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        client_max_body_size 20M;
    }

    location /static/outputs/ {
        alias /opt/aipic/backend/outputs/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /static/js/ {
        alias /opt/aipic/backend/static/js/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location /static/css/ {
        alias /opt/aipic/backend/static/css/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location /static/ {
        alias /opt/aipic/backend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\.(env|git) {
        deny all;
        return 404;
    }

    location ~ /(user_data|temp|scripts|tests|deploy)/ {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/aipic_access.log;
    error_log /var/log/nginx/aipic_error.log;
}
